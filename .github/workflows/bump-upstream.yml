name: Bump Upstream Version

on:
  workflow_call:
    inputs:
      use_variants:
        description: "Include variant manifests/compose files in bump scan"
        required: false
        type: boolean
        default: true
      variants_dir:
        description: "Path to variants directory"
        required: false
        type: string
        default: "variants"
      tag_pattern:
        description: "Optional regex to extract version from the upstream release tag"
        required: false
        type: string
        default: ""
      docker_tag_pattern:
        description: "Optional template for Docker tag checks, e.g. multiarch-{version}"
        required: false
        type: string
        default: ""
      build_arg:
        description: "Optional compose build arg override for the targeted upstream"
        required: false
        type: string
        default: ""
      upstream_repo:
        description: "Optional upstream repo slug to target env overrides at a specific dependency"
        required: false
        type: string
        default: ""
      dry_run:
        description: "If true, log write operations without executing them"
        required: false
        type: boolean
        default: false
    secrets:
      TROPI_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-upstream:
    runs-on: ubuntu-latest
    name: Check Upstream Version
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.TROPI_APP_ID }}
          private-key: ${{ secrets.TROPI_APP_PRIVATE_KEY }}

      - name: Run upstream bump
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_USE_VARIANTS: ${{ inputs.use_variants }}
          INPUT_VARIANTS_DIR: ${{ inputs.variants_dir }}
          INPUT_TAG_PATTERN: ${{ inputs.tag_pattern }}
          INPUT_DOCKER_TAG_PATTERN: ${{ inputs.docker_tag_pattern }}
          INPUT_BUILD_ARG: ${{ inputs.build_arg }}
          INPUT_UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          docker_args=(
            --rm
            --pull=always
            -e "GITHUB_TOKEN=${APP_TOKEN}"
            -e "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
            -e "BUMP_FAIL_ON_ERRORS=true"
            -e "USE_VARIANTS=${INPUT_USE_VARIANTS}"
            -e "VARIANTS_DIR=${INPUT_VARIANTS_DIR}"
            -e "DRY_RUN=${INPUT_DRY_RUN}"
          )

          if [[ -n "${INPUT_TAG_PATTERN}" ]]; then
            docker_args+=(-e "TAG_PATTERN=${INPUT_TAG_PATTERN}")
          fi

          if [[ -n "${INPUT_DOCKER_TAG_PATTERN}" ]]; then
            docker_args+=(-e "DOCKER_TAG_PATTERN=${INPUT_DOCKER_TAG_PATTERN}")
          fi

          if [[ -n "${INPUT_BUILD_ARG}" ]]; then
            docker_args+=(-e "BUILD_ARG=${INPUT_BUILD_ARG}")
          fi

          if [[ -n "${INPUT_UPSTREAM_REPO}" ]]; then
            docker_args+=(-e "UPSTREAM_REPO=${INPUT_UPSTREAM_REPO}")
          fi

          docker run "${docker_args[@]}" dappnode/tropibot:latest bump-runner
