name: Bump Upstream Version

on:
  workflow_call:
    inputs:
      use_variants:
        description: "Whether to use --use-variants flag"
        required: false
        type: boolean
        default: true
    secrets:
      TROPI_APP_ID:
        required: true
      TROPI_APP_PRIVATE_KEY:
        required: true
      PINATA_API_KEY:
        required: false
      PINATA_SECRET_API_KEY:
        required: false

jobs:
  bump-upstream:
    runs-on: ubuntu-latest
    name: Check Upstream Version
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TROPI_APP_ID }}
          private-key: ${{ secrets.TROPI_APP_PRIVATE_KEY }}

      - name: Bump upstream
        run: |
          ARGS=""
          if [ "${{ inputs.use_variants }}" = "true" ]; then
            ARGS="--use-variants"
          fi
          npx @dappnode/dappnodesdk github-action bump-upstream $ARGS
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
