name: Build DAppNode Package

on:
  workflow_call:
    inputs:
      variant:
        description: "Package variant to build (e.g., hoodi, mainnet, gnosis)"
        required: true
        type: string
      runner_label:
        description: "Runner label for self-hosted runners"
        required: false
        type: string
        default: "ubuntu-latest"
      upload_to_ipfs:
        description: "Upload built package to IPFS"
        required: false
        type: boolean
        default: true
    outputs:
      ipfs_hash:
        description: "IPFS hash of the built package"
        value: ${{ jobs.build.outputs.ipfs_hash }}

jobs:
  build:
    runs-on: ${{ inputs.runner_label }}
    name: Build ${{ inputs.variant }}
    outputs:
      ipfs_hash: ${{ steps.extract_hash.outputs.ipfs_hash }}
    steps:
      - uses: actions/checkout@v6

      - name: Build package
        run: |
          if [ "${{ inputs.upload_to_ipfs }}" = "true" ] && command -v docker &> /dev/null; then
            IPFS_IP=$(docker inspect DAppNodeCore-ipfs.dnp.dappnode.eth --format '{{.NetworkSettings.Networks.dncore_network.IPAddress}}' 2>/dev/null || echo "")
            if [ -n "$IPFS_IP" ]; then
              npx @dappnode/dappnodesdk build --provider=http://${IPFS_IP}:5001 --variant=${{ inputs.variant }}
            else
              npx @dappnode/dappnodesdk build --variant=${{ inputs.variant }}
            fi
          else
            npx @dappnode/dappnodesdk build --variant=${{ inputs.variant }}
          fi

      - name: Extract IPFS hash
        id: extract_hash
        run: |
          RELEASES_FILE="package_variants/${{ inputs.variant }}/releases.json"
          if [ -f "$RELEASES_FILE" ]; then
            IPFS_HASH=$(jq -r 'to_entries | last | .value.hash' "$RELEASES_FILE")
            echo "ipfs_hash=$IPFS_HASH" >> $GITHUB_OUTPUT
            echo "Built package with IPFS hash: $IPFS_HASH"
          else
            echo "No releases.json found"
            echo "ipfs_hash=" >> $GITHUB_OUTPUT
          fi
