name: Build Test and Release

on:
  workflow_call:
    inputs:
      build_variant:
        description: "Package variant to build on PR (e.g., mainnet, hoodi)"
        required: false
        type: string
        default: "mainnet"
      all_variants:
        description: "Publish all variants on release"
        required: false
        type: boolean
        default: true
      timeout:
        description: "Publish timeout"
        required: false
        type: string
        default: "30m"
      skip_save:
        description: "Skip saving build artifacts on PR test"
        required: false
        type: boolean
        default: true
    secrets:
      TROPI_APP_ID:
        required: true
      TROPI_APP_PRIVATE_KEY:
        required: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    name: Build test
    if: github.event_name != 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Build package
        run: |
          ARGS="--variant ${{ inputs.build_variant }}"
          if [ "${{ inputs.skip_save }}" = "true" ]; then
            ARGS="$ARGS --skip_save"
          fi
          npx @dappnode/dappnodesdk build $ARGS

  release:
    runs-on: ubuntu-latest
    name: Release
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TROPI_APP_ID }}
          private-key: ${{ secrets.TROPI_APP_PRIVATE_KEY }}

      - name: Publish
        run: |
          ARGS="patch --dappnode_team_preset --timeout ${{ inputs.timeout }}"
          if [ "${{ inputs.all_variants }}" = "true" ]; then
            ARGS="$ARGS --all-variants"
          fi
          npx @dappnode/dappnodesdk publish $ARGS
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          DEVELOPER_ADDRESS: "0xf35960302a07022aba880dffaec2fdd64d5bf1c1"
